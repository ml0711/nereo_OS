<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>nereo OS</title>
<style>
  :root{
    --bg:#0b0d10; --bg2:#0f1216; --panel:#141a20; --panel2:#1b232c; --line:#222a33;
    --txt:#e6edf3; --mut:#8b97a5; --mut2:#5d6773;
    --acc:#2f6bff; --acc2:#5b8cff; --ok:#39c07a; --warn:#e6a23c; --bad:#e15b5b;
    --sb:268px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--txt);
    font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:inherit}
  code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
  .topbar{position:fixed;top:0;left:0;right:0;height:58px;z-index:20;
    display:flex;align-items:center;gap:14px;padding:0 20px;
    background:rgba(11,13,16,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .brand{font-weight:700;letter-spacing:-.02em;font-size:19px}
  .brand span{color:var(--acc2)}
  .spacer{flex:1}
  .user{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--mut)}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--acc),#7b3ff2);color:#fff;font-weight:700;font-size:13px}
  .user b{color:var(--txt);font-weight:600}
  .btn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;text-decoration:none;
    border:1px solid var(--line);background:var(--panel2);color:var(--txt);
    padding:7px 13px;border-radius:9px;font-size:13.5px;font-weight:500}
  .btn:hover{border-color:var(--acc)}
  .btn[disabled]{opacity:.5;cursor:default}
  .btn[disabled]:hover{border-color:var(--line)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:5px 11px;font-size:12.5px;border-radius:8px}
  .btn.acc{background:var(--acc);border-color:var(--acc);color:#fff}
  .shell{display:flex;min-height:100vh;padding-top:58px}
  .side{position:fixed;top:58px;bottom:0;left:0;width:var(--sb);padding:16px 14px;
    border-right:1px solid var(--line);background:var(--bg2);overflow:auto}
  .root-pin{display:flex;align-items:center;gap:11px;padding:12px 13px;margin-bottom:12px;border-radius:11px;
    background:rgba(47,107,255,.1);border:1px solid rgba(47,107,255,.28);cursor:pointer}
  .root-pin:hover{border-color:var(--acc)}
  .root-pin .ico{font-size:17px;color:var(--acc2)}
  .root-pin b{font-weight:600;font-size:14px;display:block;line-height:1.25}
  .root-pin .sub{font-size:10.5px;color:var(--mut2);text-transform:uppercase;letter-spacing:.5px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
    color:var(--mut);text-decoration:none;font-size:14px;font-weight:500;cursor:pointer}
  .nav a:hover{background:var(--panel);color:var(--txt)}
  .nav a.active{background:rgba(47,107,255,.13);color:var(--txt)}
  .nav a.active .ico{color:var(--acc2)}
  .nav .ico{width:18px;text-align:center;color:var(--mut2);font-size:15px}
  .sec{margin:18px 0 6px;padding:0 12px;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut2)}
  .main{flex:1;margin-left:var(--sb);padding:24px 30px;max-width:1280px}
  .crumbs{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:13px;color:var(--mut);margin-bottom:14px;min-height:18px}
  .crumbs a{color:var(--mut);cursor:pointer;text-decoration:none}
  .crumbs a:hover{color:var(--txt)}
  .crumbs .sep{color:var(--mut2)}
  .crumbs .cur{color:var(--txt);font-weight:600}
  .ctx-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .ctx-head h2{margin:0;font-size:21px;letter-spacing:-.01em}
  .cap-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px;
    background:rgba(47,107,255,.14);color:var(--acc2)}
  .actionbar{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .page-sub{color:var(--mut);font-size:13.5px;margin-bottom:18px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:13px;margin-bottom:24px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px}
  .kpi .n{font-size:26px;font-weight:700;letter-spacing:-.02em}
  .kpi .l{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:12px;margin-bottom:20px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;
    display:flex;flex-direction:column;gap:7px}
  .tile:hover{border-color:var(--acc)}
  .tile .t-top{display:flex;align-items:center;gap:10px;min-width:0}
  .tile .t-ico{font-size:16px;color:var(--acc2);flex:none}
  .tile .t-name{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tile .t-meta{font-size:12px;color:var(--mut2);display:flex;gap:13px}
  .tile .t-actions{display:flex;gap:6px;margin-top:2px}
  .ftable{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:20px}
  .fr{display:flex;align-items:center;gap:13px;padding:9px 14px;border-top:1px solid var(--line);font-size:13.5px}
  .fr:first-child{border-top:none}
  .fr .fx{font-size:10px;color:var(--mut2);text-transform:uppercase;width:38px;flex:none}
  .fr .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fr .fs{color:var(--mut);font-size:12px;width:74px;text-align:right;flex:none}
  .fr .fd{color:var(--mut2);font-size:12px;width:86px;text-align:right;flex:none}
  .section-label{margin:18px 0 10px;color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .empty{padding:42px 20px;text-align:center;color:var(--mut2);background:var(--panel);border:1px dashed var(--line);border-radius:12px}
  .cfg{background:var(--panel);border:1px solid var(--warn);border-radius:13px;padding:20px 22px}
  .cfg h2{margin:0 0 8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:13px}
  .card .head{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .card h3{margin:0;font-size:16.5px;font-weight:600}
  .card .proj{color:var(--mut);font-size:13px}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .b-Aktiv{background:rgba(57,192,122,.15);color:var(--ok)}
  .b-Pipeline{background:rgba(47,107,255,.15);color:var(--acc2)}
  .b-Vorlage{background:rgba(230,162,60,.15);color:var(--warn)}
  .b-Dropped{background:rgba(225,91,91,.15);color:var(--bad)}
  .meta{color:var(--mut);font-size:13px;margin:11px 0 12px;display:flex;gap:18px;flex-wrap:wrap}
  .meta b{color:var(--txt);font-weight:600}
  .bar{height:8px;background:var(--panel2);border-radius:5px;overflow:hidden}
  .bar > div{height:100%;background:linear-gradient(90deg,var(--bad),var(--warn),var(--ok))}
  .compl{display:flex;align-items:center;gap:12px}
  .compl .lbl{font-size:13px;color:var(--mut);white-space:nowrap}
  .types{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .type{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:2px 7px;font-size:11.5px;color:var(--mut)}
  .cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:4px 14px;margin-top:13px;font-size:12.5px}
  .cat{display:flex;align-items:center;gap:7px;color:var(--mut2)}
  .cat.present{color:var(--txt)}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .dot.y{background:var(--ok)} .dot.n{background:var(--bad)}
  .toggle{color:var(--acc2);font-size:12.5px;cursor:pointer;margin-top:11px;display:inline-block}
  .hidden{display:none}
  .ai{margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
  .ai .ai-head{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .ai .tag{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--acc2);
    background:rgba(47,107,255,.12);padding:3px 8px;border-radius:6px}
  .score{font-weight:800;font-size:15px}
  .ai h4{margin:13px 0 7px;font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)}
  .ai ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px}
  .ai li{font-size:13.5px;display:flex;gap:9px;align-items:flex-start}
  .sev{flex:none;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;margin-top:1px}
  .sev.kritisch,.sev.hoch{background:rgba(225,91,91,.16);color:var(--bad)}
  .sev.wichtig,.sev.mittel{background:rgba(230,162,60,.16);color:var(--warn)}
  .sev.optional,.sev.niedrig{background:rgba(139,151,165,.14);color:var(--mut)}
  .ai .sum{font-size:13.5px;color:var(--txt);margin-top:11px;line-height:1.6}
  .ai .none{color:var(--mut)}
  .noai{margin-top:13px;border-top:1px dashed var(--line);padding-top:12px;color:var(--mut2);font-size:13px}
  .state{padding:46px 20px;text-align:center;color:var(--mut)}
  .state.err{color:var(--bad)}
  .note{font-size:12.5px;color:var(--mut2)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 16px;
    font-size:13.5px;box-shadow:0 8px 30px rgba(0,0,0,.4);display:none;max-width:90vw}
  .menu-btn{display:none;font-size:18px;line-height:1;background:transparent;border:1px solid var(--line);
    color:var(--txt);border-radius:8px;padding:6px 11px;cursor:pointer}
  .menu-btn:hover{border-color:var(--acc)}
  @media(max-width:820px){
    :root{--sb:0px}
    .side{transform:translateX(-100%);transition:transform .2s ease;z-index:30;box-shadow:0 0 40px rgba(0,0,0,.5)}
    .side.open{transform:translateX(0)}
    .main{margin-left:0;padding:18px 14px}
    .menu-btn{display:inline-flex}
  }
</style>
</head>
<body>
<div class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Menü">☰</button>
  <div class="brand">nereo<span>·</span>OS</div>
  <div class="spacer"></div>
  <div class="user"><span class="avatar" id="avatar">·</span><span>Angemeldet als <b id="who">…</b></span></div>
  <a class="btn ghost" href="/logout">Abmelden</a>
</div>

<div class="shell">
  <aside class="side">
    <div class="root-pin" id="rootPin" data-nav=""><span class="ico">⌂</span><div><b id="rootName">Lädt …</b><span class="sub">Workspace-Wurzel</span></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="sec">Quellen</div>
    <span class="note" style="padding:6px 12px;display:block">SharePoint / M365 · live gespiegelt</span>
  </aside>

  <main class="main" id="main">
    <div class="crumbs" id="crumbs"></div>
    <div class="ctx-head" id="ctxHead"></div>
    <div id="view"><div class="state">Lade Workspace …</div></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const $=(s)=>document.querySelector(s);
const fmtGB=(b)=>(b/1e9).toFixed(2)+" GB";
const fmtMB=(b)=>b>=1e9?fmtGB(b):(b/1e6).toFixed(0)+" MB";
const fmtSize=(b)=>b==null?"":b>=1e9?(b/1e9).toFixed(1)+" GB":b>=1e6?(b/1e6).toFixed(1)+" MB":b>=1e3?(b/1e3).toFixed(0)+" KB":b+" B";
const fmtDate=(s)=>s?new Date(s).toLocaleDateString("de-DE"):"—";
const esc=(s="")=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
// Nur http(s)-Links zulassen — esc() neutralisiert javascript:/data: NICHT (Defense-in-Depth).
const safeHref=(u)=>/^https?:\/\//i.test(String(u||""))?u:null;
const STATUS_COLOR={Aktiv:"#39c07a",Pipeline:"#2f6bff",Vorlage:"#e6a23c",Dropped:"#e15b5b"};
const CAP_ICON={"workspace-root":"⌂",dataroom:"▣",projects:"◧",company:"▤",folder:"▸"};

// Zentraler Zustand = Position im gespiegelten Baum + Overlays.
const STATE={ root:null, sections:[], here:null, portfolio:null, analyses:{}, _navSeq:0 };

function toast(msg){const t=$("#toast");t.textContent=msg;t.style.display="block";clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",4800);}

async function fetchJSON(url,opts){
  const r=await fetch(url,opts);
  if(r.status===401){location.href="/login";return null;}
  return r.json().catch(()=>null);
}

// ---------- Identität ----------
fetch("/api/me").then(r=>r.ok?r.json():null).then(d=>{
  const u=d&&d.user; const name=(u&&(u.name||u.username||u.email||u.sub))||"—";
  $("#who").textContent=name; $("#avatar").textContent=(name[0]||"·").toUpperCase();
}).catch(()=>{});

// Mobile: Sidebar als Off-Canvas ein-/ausblenden (auf Desktop ist der Button ausgeblendet).
$("#menuBtn").onclick=()=>document.querySelector(".side").classList.toggle("open");

// ---------- KI-Analyse-Rendering (recycelt) ----------
function aiHtml(a){
  if(!a) return `<div class="noai">Noch nicht KI-analysiert — über „✦ KI-Analyse" starten.</div>`;
  const sc=a.completeness_score>=75?"var(--ok)":a.completeness_score>=50?"var(--warn)":"var(--bad)";
  const gaps=(a.critical_gaps||[]).map(g=>`<li><span class="sev ${esc(g.importance)}">${esc(g.importance)}</span><span><b>${esc(g.category)}</b> — ${esc(g.note)}</span></li>`).join("");
  const risks=(a.risks||[]).map(r=>`<li><span class="sev ${esc(r.severity)}">${esc(r.severity)}</span><span><b>${esc(r.title)}</b> — ${esc(r.detail)}</span></li>`).join("");
  const inc=(a.inconsistencies||[]).map(i=>`<li><span class="sev mittel">!</span><span>${esc(i)}</span></li>`).join("");
  return `<div class="ai">
    <div class="ai-head"><span class="tag">KI-ANALYSE</span>
      <span>Score <span class="score" style="color:${sc}">${a.completeness_score}</span>/100</span>
      <span class="note" style="margin-left:auto">${esc(a.model||"")}</span></div>
    <div class="sum">${esc(a.summary||"")}</div>
    ${gaps?`<h4>Kritische Lücken (${a.critical_gaps.length})</h4><ul>${gaps}</ul>`:`<h4>Lücken</h4><div class="none note">keine kritischen Lücken erkannt</div>`}
    ${risks?`<h4>Risiken (${a.risks.length})</h4><ul>${risks}</ul>`:""}
    ${inc?`<h4>Unstimmigkeiten (${a.inconsistencies.length})</h4><ul>${inc}</ul>`:""}
  </div>`;
}

// Datenraum-Karte (recycelt). livePath → Analyse-Button löst Live-Analyse dieses Pfads aus.
function cardHtml(r,opts={}){
  const pct=Math.round(r.schema.matched/r.schema.total*100);
  const cats=r.schema.categories.map(c=>`<div class="cat ${c.present?'present':''}"><span class="dot ${c.present?'y':'n'}"></span>${c.num}_${esc(c.label)}${c.present&&c.files?` <span class="note">(${c.files})</span>`:""}</div>`).join("");
  const types=(r.fileTypes||[]).map(([e,n])=>`<span class="type">${esc(e)} ${n}</span>`).join("");
  const btn=`<button class="btn ghost sm" data-action="live-room" data-path="${esc(opts.livePath??"")}" style="margin-left:auto">${r.analysis?'↻ Neu analysieren':'✦ KI-Analyse'}</button>`;
  return `<div class="card">
    <div class="head">
      <h3>${esc(r.name)}</h3>
      <span class="badge b-${r.status}">${r.status}</span>
      <span class="proj">· ${esc(r.owner)}</span>
      ${btn}
    </div>
    <div class="meta">
      <span><b>${r.files}</b> Dateien</span><span><b>${r.folders}</b> Ordner</span>
      <span><b>${fmtMB(r.bytes)}</b></span><span>geändert <b>${fmtDate(r.modified)}</b></span>
    </div>
    <div class="types">${types}</div>
    ${r.schema.usesStandard?`
      <div class="compl" style="margin-top:13px">
        <span class="lbl">Schema 00–16: <b style="color:var(--txt)">${r.schema.matched}/${r.schema.total}</b></span>
        <div class="bar" style="flex:1"><div style="width:${pct}%"></div></div>
        <span class="lbl">${pct}%</span></div>
      <span class="toggle" onclick="this.nextElementSibling.classList.toggle('hidden')">Kategorien ▾</span>
      <div class="cats hidden">${cats}</div>`
    :`<div class="meta" style="margin-top:8px"><span style="color:var(--warn)">⚠ Kein Standard-Schema (00–16) erkannt</span></div>`}
    ${aiHtml(r.analysis)}
  </div>`;
}

// ---------- Listen-Bausteine ----------
function tilesHtml(folders,opts={}){
  if(!folders.length) return "";
  return `<div class="tiles">`+folders.map(f=>{
    let ico="▸";
    if(opts.typed){ const sec=STATE.sections.find(s=>s.name===f.name); if(sec) ico=CAP_ICON[sec.capability.id]||ico; }
    const cc=f.childCount!=null?`${f.childCount} Einträge`:"";
    const an=(opts.analyze&&f.analyzable)?`<div class="t-actions"><button class="btn ghost sm" data-action="live-room" data-path="${esc(f.path)}">✦ Analysieren</button></div>`:"";
    return `<div class="tile" data-nav="${esc(f.path)}">
      <div class="t-top"><span class="t-ico">${ico}</span><span class="t-name">${esc(f.name)}</span></div>
      <div class="t-meta">${cc?`<span>${cc}</span>`:""}${f.modified?`<span>${fmtDate(f.modified)}</span>`:""}</div>
      ${an}</div>`;
  }).join("")+`</div>`;
}
function filesHtml(files){
  if(!files.length) return "";
  return `<div class="ftable">`+files.map(f=>{const u=safeHref(f.webUrl);return `
    <div class="fr"><span class="fx">${esc(f.ext||"·")}</span><span class="fn">${esc(f.name)}</span>
    <span class="fs">${fmtSize(f.size)}</span><span class="fd">${fmtDate(f.modified)}</span>
    ${u?`<a class="btn ghost sm" href="${esc(u)}" target="_blank" rel="noopener noreferrer" title="In SharePoint öffnen">↗</a>`:""}</div>`;}).join("")+`</div>`;
}
function browserHtml(children){
  const folders=children.filter(c=>c.type==="folder"), files=children.filter(c=>c.type==="file");
  if(!folders.length&&!files.length) return `<div class="empty">Dieser Ordner ist leer.</div>`;
  return tilesHtml(folders)+filesHtml(files);
}

// ---------- Views je Capability ----------
function rootViewHtml(){
  let kpi="";
  const p=STATE.portfolio;
  if(p&&p.summary){
    const s=p.summary;
    kpi=`<div class="kpis">`+[
      ["Datenräume",s.total],["Dateien",(s.files||0).toLocaleString("de-DE")],["Volumen",fmtGB(s.bytes||0)],
      ["Ø Vollständigkeit",s.avgCompleteness!=null?s.avgCompleteness+" %":"—"],["KI-analysiert",`${p.analyzed||0} / ${s.total}`],
    ].map(([l,n])=>`<div class="kpi"><div class="n">${n}</div><div class="l">${esc(l)}</div></div>`).join("")+`</div>`;
  }
  const ts=p&&p.generatedAt?fmtDate(p.generatedAt):null;
  const stale=ts?`<div class="note" style="margin:-14px 0 18px">Kennzahlen: Index-Stand vom ${ts}${p.source?` (${p.source==="postgres"?"App-Postgres":"Datei"})`:""} · Navigation ist live</div>`:"";
  const folders=STATE.here.children.filter(c=>c.type==="folder");
  return `<div class="page-sub">Spiegelt die SharePoint-Struktur live. Wähle einen Bereich — die verfügbaren Funktionen richten sich nach dem Ordner.</div>
    ${kpi}${stale}<div class="section-label">Bereiche</div>${tilesHtml(folders,{typed:true})}${filesHtml(STATE.here.children.filter(c=>c.type==="file"))}`;
}
function projectsViewHtml(){
  const folders=STATE.here.children.filter(c=>c.type==="folder"), files=STATE.here.children.filter(c=>c.type==="file");
  const sub=`<div class="page-sub">Projekte in „${esc(STATE.here.self.name)}" — Ordner öffnen oder direkt analysieren.</div>`;
  const body=(folders.length||files.length)?tilesHtml(folders,{analyze:true})+filesHtml(files):`<div class="empty">Keine Einträge.</div>`;
  const done=folders.map(f=>STATE.analyses[f.path]?cardHtml(STATE.analyses[f.path],{livePath:f.path}):"").filter(Boolean).join("");
  return sub+body+(done?`<div class="section-label">Analysen</div>${done}`:"");
}
function dataroomViewHtml(){
  const h=STATE.here;
  const room=STATE.analyses[h.path]||((STATE.portfolio&&STATE.portfolio.rooms)||[]).find(r=>r.path===h.indexPath);
  const head=room?cardHtml(room,{livePath:h.path})
    :`<div class="card"><div class="head"><h3>${esc(h.self.name)}</h3><span class="cap-badge">Datenraum</span>
       <button class="btn acc sm" data-action="live-room" data-path="${esc(h.path)}" style="margin-left:auto">✦ KI-Analyse starten</button></div>
       <div class="noai">Noch nicht analysiert. Die Live-Analyse prüft Vollständigkeit gegen Schema 00–16, Risiken und Unstimmigkeiten.</div></div>`;
  return head+`<div class="section-label">Inhalt</div>${browserHtml(h.children)}`;
}
function renderView(){
  if(!STATE.here) return;
  const v=STATE.here.capability.view;
  const html = v==="workspace-root"?rootViewHtml()
    : v==="dataroom"?dataroomViewHtml()
    : v==="projects"?projectsViewHtml()
    : browserHtml(STATE.here.children); // company + folder
  $("#view").innerHTML=html;
}

// ---------- Shell ----------
function actionBtn(a){
  if(a.kind==="analyze"){
    // Analyse des aktuellen Ordners (live). An der Wurzel gibt es diese Aktion nicht — und am
    // nackten Projekte-Container (Tiefe ≤1) NICHT, sonst würde der ganze Sammelordner als EIN
    // Datenraum bewertet (sinnloser Aggregat-Score). Analyse je Projekt läuft über die Kacheln.
    const segs=(STATE.here.path||"").split("/").filter(Boolean);
    if(STATE.here.capability.id==="projects"&&segs.length<=1) return "";
    return `<button class="btn acc sm" data-action="live-room" data-path="${esc(STATE.here.path)}">✦ ${esc(a.label)}</button>`;
  }
  // Schreib-Aktionen: sichtbar, aber bewusst „für später" (Schreibmacht ist abgesichert, kein Auto-Write).
  return `<button class="btn ghost sm" disabled title="${a.future?'kommt bald':(a.enabled?'':'Schreibzugriff deaktiviert')}">+ ${esc(a.label)}</button>`;
}
function renderHeader(){
  const cap=STATE.here.capability;
  const title=STATE.here.path?STATE.here.self.name:STATE.root.name;
  const acts=cap.actions.map(actionBtn).join("");
  const u=safeHref(STATE.here.self.webUrl);
  $("#ctxHead").innerHTML=`<h2>${esc(title)}</h2><span class="cap-badge">${esc(cap.label)}</span>
    ${u?`<a class="btn ghost sm" href="${esc(u)}" target="_blank" rel="noopener noreferrer">↗ SharePoint</a>`:""}
    <div class="actionbar">${acts}</div>`;
}
function renderCrumbs(){
  const bc=STATE.here.breadcrumb;
  $("#crumbs").innerHTML=bc.map((c,i)=>{
    const last=i===bc.length-1;
    const part=last?`<span class="cur">${esc(c.name)}</span>`:`<a data-nav="${esc(c.path)}">${esc(c.name)}</a>`;
    return (i?`<span class="sep">›</span>`:"")+part;
  }).join("");
}
function renderSidebar(){
  const top=STATE.here&&STATE.here.breadcrumb[1]?STATE.here.breadcrumb[1].name:"";
  $("#nav").innerHTML=STATE.sections.map(s=>
    `<a class="${s.name===top?"active":""}" data-nav="${esc(s.path)}"><span class="ico">${CAP_ICON[s.capability.id]||"▸"}</span> ${esc(s.name)}</a>`
  ).join("");
}
function renderShell(){ renderSidebar(); renderCrumbs(); renderHeader(); renderView(); }

// ---------- Navigation ----------
function hashPath(){
  return location.hash.replace(/^#\/?/,"").split("/").filter(Boolean).map(s=>{try{return decodeURIComponent(s)}catch{return s}});
}
async function navigate(segments,{push=true}={}){
  if(!STATE.root) return;
  const rel=segments.join("/");
  const seq=++STATE._navSeq; // jüngster Klick gewinnt — veraltete Antworten werden verworfen
  $("#view").innerHTML=`<div class="state">Lädt …</div>`; $("#ctxHead").innerHTML=""; $("#crumbs").innerHTML="";
  const d=await fetchJSON("/api/fs?path="+encodeURIComponent(rel));
  if(seq!==STATE._navSeq) return; // eine neuere Navigation läuft bereits
  if(!d) return;
  if(d.error){ $("#view").innerHTML=`<div class="state err">${esc(d.error)}</div>`; return; }
  STATE.here=d;
  if(push){ const hp="#/"+segments.map(encodeURIComponent).join("/"); if(location.hash!==hp) history.pushState(null,"",hp); }
  renderShell();
}

// Eine delegierte Klick-Behandlung für Navigation (Sidebar/Breadcrumb/Kacheln/Root-Pin)
// und Live-Analyse-Buttons. Analyse-Button zuerst → verhindert gleichzeitiges Navigieren.
document.body.addEventListener("click",(e)=>{
  const ab=e.target.closest("button[data-action='live-room']");
  if(ab){ e.preventDefault(); analyzeLive(ab.dataset.path,ab); return; }
  const nav=e.target.closest("[data-nav]");
  if(nav){ e.preventDefault(); document.querySelector(".side").classList.remove("open"); navigate(nav.getAttribute("data-nav").split("/").filter(Boolean)); }
});

async function analyzeLive(rel,btn){
  if(!rel){ toast("Analyse braucht einen Datenraum-/Projektpfad."); return; }
  const old=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Analysiere …";}
  try{
    const d=await fetchJSON("/api/datarooms/analyze?live=1&path="+encodeURIComponent(rel),{method:"POST"});
    if(!d) return;
    if(d.error||d.failed||!d.result){ toast("Analyse fehlgeschlagen: "+(d.error||"kein API-Key?")); }
    else{ STATE.analyses[rel]=d.result; toast(`Analysiert: ${d.room} · Score ${d.score}`); renderHeader(); renderView(); }
  }catch(e){ toast(e.message); }
  finally{ if(btn){btn.disabled=false;btn.textContent=old;} }
}

// ---------- Boot ----------
function renderDegraded(d){
  $("#crumbs").innerHTML=""; $("#ctxHead").innerHTML="";
  $("#view").innerHTML=`<div class="cfg"><h2>Workspace-Wurzel nicht gefunden</h2>
    <p>${esc(d.reason||"Die fixe Wurzel konnte nicht aufgelöst werden.")}</p>
    ${(d.candidates&&d.candidates.length)?`<p class="note">Mögliche Kandidaten im OneDrive:</p><ul>${d.candidates.map(c=>`<li><b>${esc(c.name)}</b> — <code>${esc(c.itemId)}</code></li>`).join("")}</ul>`:""}
    <p class="note">Setze <code>WORKSPACE_ROOT_DRIVE_ID</code> + <code>WORKSPACE_ROOT_ITEM_ID</code> (oder <code>WORKSPACE_ROOT_FOLDER</code>) in der App-Umgebung und lade neu.</p></div>`;
}
async function bootWorkspace(){
  const d=await fetchJSON("/api/workspace");
  if(!d){ return false; }
  if(d.error){ $("#view").innerHTML=`<div class="state err">${esc(d.error)}</div>`; return false; }
  if(!d.root){ $("#rootName").textContent="—"; renderDegraded(d); return false; }
  STATE.root=d.root; STATE.sections=d.nav||[]; STATE.writeEnabled=d.writeEnabled;
  $("#rootName").textContent=d.root.name;
  renderSidebar();
  return true;
}
async function loadPortfolio(){
  try{ const d=await fetchJSON("/api/datarooms"); if(d&&!d.error) STATE.portfolio=d; }catch{}
  if(STATE.here&&STATE.here.capability.view==="workspace-root") renderView(); // KPIs nachziehen
}

(async()=>{
  loadPortfolio(); // parallel, nicht-blockierend (Overlay-Daten)
  const ok=await bootWorkspace();
  if(!ok) return;
  window.addEventListener("popstate",()=>navigate(hashPath(),{push:false}));
  navigate(hashPath(),{push:false});
})();
</script>
</body>
</html>
