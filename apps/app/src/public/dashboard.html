<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>nereo OS — Datenraum-Übersicht</title>
<style>
  :root {
    --bg:#0f1216; --panel:#171c22; --panel2:#1e252d; --line:#2a323c;
    --txt:#e6edf3; --mut:#8b97a5; --acc:#4f8cff; --ok:#39c07a; --warn:#e6a23c; --bad:#e15b5b;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:22px 28px; border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  header h1 { margin:0; font-size:20px; letter-spacing:.3px; }
  header .sub { color:var(--mut); font-size:13px; }
  main { padding:24px 28px; max-width:1200px; margin:0 auto; }
  .stats { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px 18px; min-width:130px; }
  .stat .n { font-size:24px; font-weight:600; }
  .stat .l { color:var(--mut); font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  .toolbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .chip { background:var(--panel2); border:1px solid var(--line); color:var(--mut);
    padding:5px 12px; border-radius:20px; font-size:13px; cursor:pointer; }
  .chip.active { color:var(--txt); border-color:var(--acc); }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; margin-bottom:12px; }
  .card .top { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .card h3 { margin:0; font-size:16px; }
  .card .proj { color:var(--mut); font-size:13px; }
  .badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:6px; text-transform:uppercase; letter-spacing:.4px; }
  .b-Aktiv{background:rgba(57,192,122,.15);color:var(--ok);}
  .b-Pipeline{background:rgba(79,140,255,.15);color:var(--acc);}
  .b-Vorlage{background:rgba(230,162,60,.15);color:var(--warn);}
  .b-Dropped{background:rgba(225,91,91,.15);color:var(--bad);}
  .meta { color:var(--mut); font-size:13px; margin:10px 0 12px; display:flex; gap:18px; flex-wrap:wrap; }
  .meta b { color:var(--txt); font-weight:600; }
  .bar { height:8px; background:var(--panel2); border-radius:5px; overflow:hidden; }
  .bar > div { height:100%; background:linear-gradient(90deg,var(--bad),var(--warn),var(--ok)); }
  .compl { display:flex; align-items:center; gap:12px; }
  .compl .lbl { font-size:13px; color:var(--mut); white-space:nowrap; }
  .cats { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:4px 14px;
    margin-top:14px; font-size:12.5px; display:none; }
  .cats.open { display:grid; }
  .cat { display:flex; align-items:center; gap:7px; color:var(--mut); }
  .cat.present { color:var(--txt); }
  .dot { width:8px; height:8px; border-radius:50%; flex:none; }
  .dot.y{background:var(--ok);} .dot.n{background:var(--bad);}
  .toggle { color:var(--acc); font-size:12.5px; cursor:pointer; margin-top:10px; display:inline-block; }
  .types { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .type { background:var(--panel2); border:1px solid var(--line); border-radius:5px;
    padding:2px 7px; font-size:11.5px; color:var(--mut); }
  .loading,.err { color:var(--mut); padding:40px; text-align:center; }
  .err { color:var(--bad); }
</style>
</head>
<body>
<header>
  <h1>nereo OS</h1>
  <span class="sub">Datenraum-Übersicht · read-only über Microsoft Graph</span>
</header>
<main>
  <div id="stats" class="stats"></div>
  <div id="toolbar" class="toolbar"></div>
  <div id="list"><div class="loading">Lade Datenräume …</div></div>
</main>

<script>
const fmtGB = (b) => (b/1e9).toFixed(2) + " GB";
const fmtMB = (b) => b >= 1e9 ? fmtGB(b) : (b/1e6).toFixed(0) + " MB";
const fmtDate = (s) => s ? new Date(s).toLocaleDateString("de-DE") : "—";
let DATA = null, filter = "Alle";

function render() {
  const rooms = filter === "Alle" ? DATA.rooms : DATA.rooms.filter(r => r.status === filter);
  const s = DATA.summary;
  document.getElementById("stats").innerHTML = [
    ["Datenräume", s.total],
    ["Aktiv", s.byStatus.Aktiv || 0],
    ["Pipeline", s.byStatus.Pipeline || 0],
    ["Dateien", s.files.toLocaleString("de-DE")],
    ["Volumen", fmtGB(s.bytes)],
    ["Ø Vollständigkeit", s.avgCompleteness != null ? s.avgCompleteness + " %" : "—"],
  ].map(([l,n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  const statuses = ["Alle", ...Object.keys(s.byStatus)];
  document.getElementById("toolbar").innerHTML = statuses.map(st =>
    `<span class="chip ${st===filter?'active':''}" onclick="setFilter('${st}')">${st}${st!=="Alle"?` (${s.byStatus[st]})`:""}</span>`).join("");

  document.getElementById("list").innerHTML = rooms.map(cardHtml).join("") ||
    `<div class="loading">Keine Datenräume in dieser Ansicht.</div>`;
}

function cardHtml(r) {
  const pct = Math.round(r.schema.matched / r.schema.total * 100);
  const cats = r.schema.categories.map(c =>
    `<div class="cat ${c.present?'present':''}"><span class="dot ${c.present?'y':'n'}"></span>${c.num}_${c.label}${c.present&&c.files?` <span style="color:var(--mut)">(${c.files})</span>`:""}</div>`).join("");
  const types = r.fileTypes.map(([e,n]) => `<span class="type">${e} ${n}</span>`).join("");
  return `<div class="card">
    <div class="top">
      <h3>${r.name}</h3>
      <span class="badge b-${r.status}">${r.status}</span>
      <span class="proj">· ${r.project} · ${r.owner}</span>
    </div>
    <div class="meta">
      <span><b>${r.files}</b> Dateien</span>
      <span><b>${r.folders}</b> Ordner</span>
      <span><b>${fmtMB(r.bytes)}</b></span>
      <span>geändert <b>${fmtDate(r.modified)}</b></span>
    </div>
    <div class="types">${types}</div>
    ${r.schema.usesStandard ? `
    <div class="compl" style="margin-top:12px">
      <span class="lbl">Schema 00–16: <b style="color:var(--txt)">${r.schema.matched}/${r.schema.total}</b></span>
      <div class="bar" style="flex:1"><div style="width:${pct}%"></div></div>
      <span class="lbl">${pct}%</span>
    </div>
    <span class="toggle" onclick="this.nextElementSibling.classList.toggle('open')">Kategorien ein-/ausblenden ▾</span>
    <div class="cats">${cats}</div>
    ` : `<div class="meta" style="margin-top:10px"><span style="color:var(--warn)">⚠ Kein Standard-Schema (00–16) erkannt</span></div>`}
  </div>`;
}

function setFilter(f){ filter = f; render(); }

fetch("/api/datarooms").then(r => r.json()).then(d => {
  if (d.error) { document.getElementById("list").innerHTML = `<div class="err">${d.error}</div>`; return; }
  DATA = d; render();
}).catch(e => document.getElementById("list").innerHTML = `<div class="err">${e.message}</div>`);
</script>
</body>
</html>
